<!--
  Confirm signup — the template Supabase sends to a NEW address on signInWithOtp.
  This is essentially all cold funnel traffic, so this file, not magic_link, is the
  one that decides whether acquisition works.

  MUST contain {{ .Token }}. A link here strands every first-time visitor: they are
  inside a TikTok/Instagram webview, and following a link abandons the session.

  Inline styles only — email clients strip <style> blocks. Table-free, single
  column, so it survives Gmail, Apple Mail and the in-app mail viewers.
-->
<div style="margin:0;padding:32px 16px;background:#1f1f1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <div style="max-width:420px;margin:0 auto;background:#262624;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:32px 28px;">

    <p style="margin:0 0 24px;color:#ece7de;font-size:17px;font-weight:600;line-height:1.4;">
      Your Maven code
    </p>

    <p style="margin:0 0 20px;color:rgba(236,231,222,0.7);font-size:15px;line-height:1.6;">
      Enter this code to continue:
    </p>

    <p style="margin:0 0 24px;color:#ece7de;font-size:32px;font-weight:600;letter-spacing:8px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">
      {{ .Token }}
    </p>

    <p style="margin:0;color:rgba(236,231,222,0.5);font-size:13px;line-height:1.6;">
      It expires in 60 minutes. If you didn&rsquo;t request this, you can ignore this email.
    </p>

  </div>
</div>
