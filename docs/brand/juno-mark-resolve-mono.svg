<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Juno" fill="currentColor">
  <title>Juno — The Resolve (monochrome)</title>
  <desc>Single-colour version. Inherits currentColor; set color to cream (#ece7de) or charcoal (#262624).</desc>
  <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <line x1="60" y1="74" x2="100" y2="52"/>
    <line x1="100" y1="52" x2="140" y2="74"/>
    <line x1="60" y1="74" x2="100" y2="144"/>
    <line x1="100" y1="52" x2="100" y2="144"/>
    <line x1="140" y1="74" x2="100" y2="144"/>
  </g>
  <circle cx="60" cy="74" r="6"/>
  <circle cx="100" cy="52" r="6"/>
  <circle cx="140" cy="74" r="6"/>
  <circle cx="100" cy="144" r="10"/>
</svg>
