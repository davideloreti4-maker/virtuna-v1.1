<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Juno">
  <title>Juno — The Resolve</title>
  <desc>Three interconnected audience nodes resolving into a single Read node.</desc>
  <g fill="none" stroke="#ece7de" stroke-width="2.5" stroke-linecap="round">
    <line x1="60" y1="74" x2="100" y2="52"/>
    <line x1="100" y1="52" x2="140" y2="74"/>
    <line x1="60" y1="74" x2="100" y2="144"/>
    <line x1="100" y1="52" x2="100" y2="144"/>
    <line x1="140" y1="74" x2="100" y2="144"/>
  </g>
  <circle cx="60" cy="74" r="6" fill="#ece7de"/>
  <circle cx="100" cy="52" r="6" fill="#ece7de"/>
  <circle cx="140" cy="74" r="6" fill="#ece7de"/>
  <circle cx="100" cy="144" r="10" fill="#d97757"/>
</svg>
