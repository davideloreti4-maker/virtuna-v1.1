<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#07080a;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:.2px;padding:24px}
  .nav{
    width:220px;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;
    background-image:linear-gradient(137deg,rgba(17,18,20,.75) 4.87%,rgba(12,13,15,.9) 75.88%);
    box-shadow:rgba(255,255,255,.15) 0 1px 1px 0 inset;color:#e7e7e8;
  }
  /* header: px-3 pt-4 pb-2, justify-between */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 12px 8px}
  .logo{display:flex;padding-left:8px;color:#fff}            /* pl-2 */
  .collapse{padding:6px;margin-right:-4px;color:#848586;display:flex}
  /* body px-2 */
  .body{padding:0 8px 8px}
  /* new analysis: px-2.5 gap-2.5 */
  .item{display:flex;align-items:center;gap:10px;padding:0 10px;min-height:34px;border-radius:8px;font-size:14px;font-weight:500}
  .item.accent{color:#FF7F50}
  .item.active{background:rgba(255,255,255,.05)}
  .ico{width:20px;height:20px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .label{display:block;padding:0 10px 6px;margin-top:8px;font-size:10px;font-weight:600;color:#848586;text-transform:uppercase;letter-spacing:.08em}
  .divider{height:1px;background:rgba(255,255,255,.06);margin:8px 10px}
  .guide{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,127,80,.35)}
</style></head>
<body>
  <div class="nav">
    <div class="hdr">
      <a class="logo" aria-label="Numen home">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none">
          <path d="M28 78 V22 L72 78 V22" stroke="currentColor" stroke-width="3.4" fill="none" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
          <circle cx="28" cy="78" r="5" fill="currentColor"/><circle cx="28" cy="22" r="5" fill="currentColor"/>
          <circle cx="72" cy="78" r="5" fill="currentColor"/><circle cx="72" cy="22" r="5" fill="currentColor"/>
          <circle cx="50" cy="50" r="8.5" fill="currentColor"/>
        </svg>
      </a>
      <span class="collapse">
        <svg width="20" height="20" viewBox="0 0 256 256" fill="currentColor"><path d="M216 40H40a16 16 0 0 0-16 16v144a16 16 0 0 0 16 16h176a16 16 0 0 0 16-16V56a16 16 0 0 0-16-16ZM40 56h52v144H40Zm176 144H108V56h108v144Z"/></svg>
      </span>
    </div>
    <div class="body">
      <div class="item accent">
        <span class="ico"><svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M224 128a8 8 0 0 1-8 8h-80v80a8 8 0 0 1-16 0v-80H40a8 8 0 0 1 0-16h80V40a8 8 0 0 1 16 0v80h80a8 8 0 0 1 8 8Z"/></svg></span>
        <span>New analysis</span>
      </div>
      <span class="label">Navigate</span>
      <div class="item active">
        <span class="ico"><svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M218.83 103.77 138.83 33.82a16 16 0 0 0-21.66 0l-80 69.95A16 16 0 0 0 32 115.55V208a16 16 0 0 0 16 16h48a16 16 0 0 0 16-16v-48h32v48a16 16 0 0 0 16 16h48a16 16 0 0 0 16-16v-92.45a16 16 0 0 0-5.17-11.78Z"/></svg></span>
        <span>Boards</span>
      </div>
      <div class="item">
        <span class="ico"><svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><circle cx="128" cy="128" r="40"/></svg></span>
        <span>Settings</span>
      </div>
    </div>
  </div>
</body></html>
