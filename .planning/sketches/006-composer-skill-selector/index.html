<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 006 · Composer (flat-warm, premium)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../themes/flatwarm.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--cream-2);
    letter-spacing: 0.1px; -webkit-font-smoothing: antialiased; padding-top: 50px;
  }
  svg { display: block; }
  .ico { width: 17px; height: 17px; stroke: currentColor; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; flex: none; }
  .ico-sm { width: 15px; height: 15px; }

  /* tab bar */
  #nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; background: var(--sidebar);
    border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 8px; align-items: center; }
  #nav .b { font-size: 13px; color: var(--cream-muted); margin-right: 8px; }
  #nav .b b { color: var(--cream-2); }
  .tab { font-family: var(--sans); font-size: 13px; cursor: pointer; background: transparent; color: var(--cream-muted);
    border: 1px solid var(--border); border-radius: var(--r-md); padding: 5px 12px; transition: .15s; }
  .tab:hover { border-color: var(--border-hover); color: var(--cream); }
  .tab.active { border-color: var(--coral-border); background: var(--coral-soft); color: var(--coral); }

  .variant { display: none; min-height: calc(100vh - 50px); position: relative; }
  .variant.active { display: block; }

  /* faint stele watermark */
  .watermark { position: absolute; top: 14%; left: 50%; transform: translateX(-50%); opacity: 0.05; pointer-events: none; }
  .watermark svg { width: 120px; height: 120px; stroke: var(--cream); stroke-width: 1; fill: none; }

  .center { max-width: 760px; margin: 0 auto; padding: 16vh 24px 40px; display: flex; flex-direction: column; align-items: center; }
  .greet { font-family: var(--serif); font-size: 2.6rem; font-weight: 400; color: var(--cream); letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 14px; margin-bottom: 34px; }
  .greet .stele { color: var(--coral); }
  .greet .stele svg { width: 30px; height: 30px; stroke: var(--coral); stroke-width: 1.4; fill: none; }

  /* ── composer ── */
  .composer { width: 100%; background: var(--composer); border: 1px solid var(--border);
    border-radius: var(--r-xl); box-shadow: var(--shadow-float); padding: 16px 16px 12px; position: relative; }
  .composer:focus-within { border-color: var(--border-hover); }
  .ta { width: 100%; background: transparent; border: none; resize: none; outline: none; color: var(--cream);
    font-family: var(--sans); font-size: 1.0625rem; line-height: 1.5; padding: 2px 4px 0; min-height: 30px; max-height: 140px; }
  .ta::placeholder { color: var(--cream-muted); }

  .row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .row .grow { flex: 1; }

  /* control button (icon-only, e.g. +, mic) */
  .ctl { width: 32px; height: 32px; border-radius: var(--r-md); border: 1px solid transparent; background: transparent;
    color: var(--cream-2); display: grid; place-items: center; cursor: pointer; transition: .14s; }
  .ctl:hover { background: var(--chip); color: var(--cream); }

  /* labeled chip control (skill / audience / intent) */
  .chip { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; background: transparent;
    border: 1px solid var(--border); border-radius: var(--r-md); padding: 5px 10px 5px 9px; color: var(--cream-2);
    font-family: var(--sans); font-size: 13px; font-weight: 500; transition: .14s; }
  .chip:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.02); color: var(--cream); }
  .chip .ico { color: var(--cream-muted); }
  .chip.skill .ico { color: var(--coral); }
  .chip .chev { color: var(--cream-dim); }
  .chip .lbl-dim { color: var(--cream-muted); font-weight: 400; }

  /* model indicator (right, text-led like Claude) */
  .model { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; background: transparent; border: none;
    color: var(--cream-muted); font-family: var(--sans); font-size: 13px; padding: 5px 6px; border-radius: var(--r-md); transition: .14s; }
  .model:hover { color: var(--cream-2); background: var(--chip); }
  .model b { color: var(--cream-2); font-weight: 500; }
  .model.max b { color: var(--coral); }

  .send { width: 32px; height: 32px; border-radius: var(--r-md); border: none; background: var(--coral); color: var(--coral-fg);
    display: grid; place-items: center; cursor: pointer; transition: .14s; }
  .send:hover { filter: brightness(1.06); }
  .send:disabled { background: var(--chip); color: var(--cream-dim); cursor: default; filter: none; }

  .divider-v { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

  /* ── popover ── */
  .pop-anchor { position: relative; }
  .pop { position: absolute; bottom: calc(100% + 10px); z-index: 100; min-width: 290px; background: var(--popover);
    border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-pop); padding: 6px;
    opacity: 0; transform: translateY(6px) scale(0.99); transform-origin: bottom left; pointer-events: none; transition: .15s; }
  .pop.right { left: auto; right: 0; transform-origin: bottom right; }
  .pop.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .pop-hint { font-size: 11px; color: var(--cream-dim); padding: 7px 10px 4px; display: flex; align-items: center; gap: 6px; }
  .grp { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--cream-dim);
    padding: 9px 10px 5px; display: flex; align-items: center; gap: 8px; }
  .grp .gbadge { font-size: 9px; letter-spacing: .04em; padding: 1px 6px; border-radius: var(--r-full); border: 1px solid var(--coral-border); color: var(--coral); }
  .sep { height: 1px; background: var(--border); margin: 6px 4px; }
  .item { display: flex; align-items: center; gap: 11px; padding: 8px 10px; border-radius: var(--r-md); cursor: pointer; transition: background .12s; }
  .item:hover { background: var(--popover-hi); }
  .item .ico { color: var(--cream-2); }
  .item .txt { flex: 1; min-width: 0; }
  .item .nm { font-size: 13.5px; font-weight: 500; color: var(--cream); display: flex; align-items: center; gap: 7px; }
  .item .ds { font-size: 11.5px; color: var(--cream-muted); margin-top: 1px; }
  .item .mtag { font-size: 10px; color: var(--cream-muted); }
  .item .mtag.max { color: var(--coral); }
  .item .badge-max { font-size: 9px; font-weight: 600; letter-spacing: .03em; padding: 1px 5px; border-radius: 4px;
    background: var(--coral-soft); color: var(--coral); }
  .item .chk { color: var(--coral); opacity: 0; }
  .item.on .chk { opacity: 1; }
  .item.on .nm { color: var(--coral); }
  .item .chev-r { color: var(--cream-dim); }
  .item .kbd { font-size: 10px; color: var(--cream-dim); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; }
  .item.disabled { opacity: .45; cursor: default; }
  .item.disabled:hover { background: transparent; }

  /* slash command inline menu */
  .slash { position: absolute; bottom: calc(100% + 8px); left: 12px; width: 300px; }

  /* segmented (intent) */
  .seg { display: flex; gap: 4px; padding: 6px; }
  .seg button { flex: 1; padding: 9px; border-radius: var(--r-md); border: 1px solid var(--border); background: transparent;
    color: var(--cream-2); font-family: var(--sans); font-size: 13px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .seg button .sm { font-size: 10.5px; color: var(--cream-muted); }
  .seg button.on { border-color: var(--coral-border); background: var(--coral-soft); color: var(--coral); }
  .seg button.on .sm { color: var(--coral); }

  .note { max-width: 720px; margin: 30px auto 0; padding: 0 24px; color: var(--cream-muted); font-size: 13px; line-height: 1.65; }
  .note b { color: var(--cream-2); }
  .vlabel { text-align: center; color: var(--cream-muted); font-size: 12.5px; margin-top: -18px; margin-bottom: 30px; }

  #tools { position: fixed; bottom: 12px; right: 12px; z-index: 9999; font-family: system-ui; font-size: 12px;
    background: rgba(0,0,0,.7); color: #fff; padding: 8px 12px; border-radius: 8px; opacity: .4; transition: .2s; display: flex; gap: 10px; }
  #tools:hover { opacity: 1; }
  #tools button { background: #333; color: #fff; border: none; border-radius: 5px; padding: 3px 8px; cursor: pointer; }
</style>
</head>
<body>

<div id="nav">
  <span class="b"><b>Sketch 006</b> · Composer — flat-warm, premium</span>
  <button class="tab active" onclick="show('a',event)">A: Full control bar</button>
  <button class="tab" onclick="show('b',event)">B: Minimal + slash</button>
</div>

<!-- ════ VARIANT A ════ -->
<div id="variant-a" class="variant active">
  <div class="watermark" id="wmA"></div>
  <div class="center">
    <div class="greet"><span class="stele" id="steleA"></span> Evening, Davide</div>
    <div class="composer" id="cA">
      <textarea class="ta" id="taA" placeholder="Describe an idea, paste a URL, or ask Numen…    type / for skills" rows="1" oninput="onInput('A')"></textarea>
      <div class="row">
        <!-- + attach -->
        <div class="pop-anchor">
          <button class="ctl" title="Attach / upload" onclick="toggle('attachA',event)" id="plusA"></button>
          <div class="pop" id="attachA"></div>
        </div>
        <!-- skill -->
        <div class="pop-anchor">
          <button class="chip skill" onclick="toggle('skillA',event)" id="skillBtnA"></button>
          <div class="pop" id="skillA"></div>
        </div>
        <!-- audience -->
        <div class="pop-anchor">
          <button class="chip" onclick="toggle('audA',event)" id="audBtnA"></button>
          <div class="pop" id="audA"></div>
        </div>
        <!-- intent -->
        <div class="pop-anchor">
          <button class="chip" onclick="toggle('intentA',event)" id="intentBtnA"></button>
          <div class="pop" id="intentA"></div>
        </div>

        <div class="grow"></div>

        <!-- model -->
        <div class="pop-anchor">
          <button class="model" onclick="toggle('modelA',event)" id="modelBtnA"></button>
          <div class="pop right" id="modelA"></div>
        </div>
        <button class="ctl" title="Voice" id="micA"></button>
        <button class="send" id="sendA"></button>
      </div>
      <!-- slash menu -->
      <div class="pop slash" id="slashA"></div>
    </div>
  </div>
</div>

<!-- ════ VARIANT B ════ -->
<div id="variant-b" class="variant">
  <div class="watermark" id="wmB"></div>
  <div class="center">
    <div class="greet"><span class="stele" id="steleB"></span> Evening, Davide</div>
    <div class="composer" id="cB">
      <textarea class="ta" id="taB" placeholder="Describe an idea, paste a URL, or ask Numen…    type / for skills" rows="1" oninput="onInput('B')"></textarea>
      <div class="row">
        <div class="pop-anchor">
          <button class="ctl" title="Attach / upload" onclick="toggle('attachB',event)" id="plusB"></button>
          <div class="pop" id="attachB"></div>
        </div>
        <div class="pop-anchor">
          <button class="chip skill" onclick="toggle('skillB',event)" id="skillBtnB"></button>
          <div class="pop" id="skillB"></div>
        </div>
        <div class="grow"></div>
        <div class="pop-anchor">
          <button class="model" onclick="toggle('modelB',event)" id="modelBtnB"></button>
          <div class="pop right" id="modelB"></div>
        </div>
        <button class="send" id="sendB"></button>
      </div>
      <div class="pop slash" id="slashB"></div>
    </div>
  </div>
  <div class="vlabel">Audience + intent fold into the skill popover header — the bar stays Claude-clean; <code>/</code> drives skill entry.</div>
</div>

<div class="note" id="globalNote"></div>

<div id="tools">
  <span style="opacity:.7">view:</span>
  <button onclick="document.querySelectorAll('.composer').forEach(e=>e.style.maxWidth='380px')">phone</button>
  <button onclick="document.querySelectorAll('.composer').forEach(e=>e.style.maxWidth='')">desktop</button>
</div>

<script>
// ───────── icons (stroke line, premium — no emoji) ─────────
const P = {
  plus:'<path d="M8 3v10M3 8h10"/>', chev:'<path d="M4 6l4 4 4-4"/>', chevR:'<path d="M6 4l4 4-4 4"/>',
  check:'<path d="M3 8.5l3.2 3.2L13 5"/>', mic:'<rect x="6" y="2.5" width="4" height="7.5" rx="2"/><path d="M3.5 8a4.5 4.5 0 009 0M8 12.5V14"/>',
  up:'<path d="M8 13V4M4 8l4-4 4 4"/>', people:'<circle cx="6" cy="6" r="2.2"/><path d="M2.5 13c0-2 1.6-3.2 3.5-3.2S9.5 11 9.5 13"/><path d="M10.5 4.2a2 2 0 010 3.6M11 13c0-1.4-.5-2.4-1.3-3"/>',
  target:'<circle cx="8" cy="8" r="5.2"/><circle cx="8" cy="8" r="2"/>', cpu:'<rect x="4" y="4" width="8" height="8" rx="1.5"/><path d="M6.5 1.5v2M9.5 1.5v2M6.5 12.5v2M9.5 12.5v2M1.5 6.5h2M1.5 9.5h2M12.5 6.5h2M12.5 9.5h2"/>',
  compass:'<circle cx="8" cy="8" r="6"/><path d="M10.5 5.5L9 9l-3.5 1.5L7 7z"/>', bulb:'<path d="M5.5 10a3.5 3.5 0 115 0c-.6.5-1 1-1 2H6.5c0-1-.4-1.5-1-2z"/><path d="M6.5 14h3"/>',
  anchor:'<circle cx="8" cy="3.5" r="1.5"/><path d="M8 5v8M3.5 9a4.5 4.5 0 009 0M3.5 9H5M11 9h1.5"/>',
  doc:'<path d="M4 2.5h5L12 5.5V13.5H4z"/><path d="M9 2.5V6h3M6 9h4M6 11h4"/>', shuffle:'<path d="M2.5 4.5h3l5 7h3M2.5 11.5h3l1.5-2M11 9.5l2.5 2-2.5 2M11 2.5l2.5 2-2.5 2M9.5 6.5l1-1.5"/>',
  crosshair:'<circle cx="8" cy="8" r="5.2"/><path d="M8 1.5v2.5M8 12v2.5M1.5 8h2.5M12 8h2.5"/>', chat:'<path d="M2.5 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H7l-3 2.5V11H4.5a2 2 0 01-2-2z"/>',
  tag:'<path d="M2.5 7.5l5-5H13V8l-5 5z"/><circle cx="10" cy="5" r="0.8"/>', mega:'<path d="M2.5 6.5v3l7 3V3.5z"/><path d="M9.5 5.5a3 3 0 010 5M3 9.5v2.5h2"/>',
  video:'<rect x="2" y="4" width="8" height="8" rx="1.5"/><path d="M10 7l4-2v6l-4-2z"/>', image:'<rect x="2.5" y="3.5" width="11" height="9" rx="1.5"/><circle cx="6" cy="6.5" r="1"/><path d="M3 11l3-2.5 3 2 2-1.5 3 2.5"/>',
  camera:'<rect x="2" y="4.5" width="12" height="8" rx="1.5"/><circle cx="8" cy="8.5" r="2.3"/><path d="M5.5 4.5l1-1.5h3l1 1.5"/>',
  search:'<circle cx="7" cy="7" r="4"/><path d="M10 10l3.5 3.5"/>',
  stele:'<path d="M12 2v20M12 7l-7-3M12 7l7-3M12 13l-8-2M12 13l8-2M12 18l-6-1M12 18l6-1"/>'
};
function svg(d, cls='ico'){ return `<svg class="${cls}" viewBox="0 0 16 16">${d}</svg>`; }
function steleSvg(){ return `<svg viewBox="0 0 24 24">${P.stele}</svg>`; }

// ───────── data ─────────
const SKILLS = {
  creator: [
    {id:'explore', i:P.compass,  nm:'Explore', ds:'Audience-curated discovery', m:'Flash'},
    {id:'idea',    i:P.bulb,     nm:'Ideas',   ds:'Funnel-top idea cards',       m:'Flash'},
    {id:'hooks',   i:P.anchor,   nm:'Hooks',   ds:'Ranked scroll-stoppers',      m:'Flash'},
    {id:'script',  i:P.doc,      nm:'Script',  ds:'Beats + retention markers',   m:'Flash'},
    {id:'remix',   i:P.shuffle,  nm:'Remix',   ds:'Decode a winner → your version', m:'Flash'},
    {id:'test',    i:P.crosshair,nm:'Test',    ds:'Full Read on a real video',   m:'Max'},
    {id:'chat',    i:P.chat,     nm:'Chat',    ds:'Ask Numen anything',          m:'Flash'},
  ],
  marketing: [
    {id:'offer', i:P.tag,  nm:'Offer Validation', ds:'Test a product, price, positioning', m:'Flash'},
    {id:'ad',    i:P.mega, nm:'Ad Creative',      ds:'Pre-flight an ad, ROAS-framed',       m:'Max'},
  ],
};
const ALL = [...SKILLS.creator, ...SKILLS.marketing];
const byId = id => ALL.find(s => s.id === id);
const AUDIENCES = [{id:'gym',nm:'Gym Beginners',sub:'TikTok · 18–25'},{id:'fin',nm:'Finance Newbies',sub:'IG · 25–34'},{id:'buyers',nm:'Skincare Buyers',sub:'Target market'}];

// per-variant state
const ST = { A:{skill:'hooks',aud:'gym',intent:'grow'}, B:{skill:'hooks',aud:'gym',intent:'grow'} };

// ───────── renderers ─────────
function renderSkillRows(active){
  const grp = (label, list, mk) => {
    let h = `<div class="grp">${label}${mk?` <span class="gbadge">MARKETING</span>`:''}</div>`;
    h += list.map(s => `<div class="item ${s.id===active?'on':''}" data-skill="${s.id}">
      ${svg(s.i)}
      <span class="txt"><span class="nm">${s.nm}${s.m==='Max'?' <span class="badge-max">MAX</span>':''}</span><span class="ds">${s.ds}</span></span>
      ${svg(P.check,'ico chk')}</div>`).join('');
    return h;
  };
  return `<div class="pop-hint">${svg(P.search,'ico ico-sm')} type to filter · ↵ select</div>`
    + grp('CREATOR', SKILLS.creator, false) + `<div class="sep"></div>` + grp('MARKETING', SKILLS.marketing, true);
}
function renderAttach(){
  return [
    {i:P.video, nm:'Upload video', sub:'Run a full SIM-1 Max Test', kbd:'⌘U'},
    {i:P.image, nm:'Add files or photos', sub:''},
    {i:P.camera, nm:'Take a screenshot', sub:''},
  ].map(o=>`<div class="item"><span class="ico">${svg(o.i)}</span><span class="txt"><span class="nm">${o.nm}</span>${o.sub?`<span class="ds">${o.sub}</span>`:''}</span>${o.kbd?`<span class="kbd">${o.kbd}</span>`:''}</div>`).join('');
}
function renderModel(active){
  const rows = [
    {m:'Flash', nm:'SIM-1 Flash', ds:'Fast text read — ideas, hooks, scripts, chat'},
    {m:'Max',   nm:'SIM-1 Max',   ds:'Full sighted video Read — the real test'},
  ];
  return `<div class="pop-hint">Auto-selected by skill · override per run</div>`
    + rows.map(r=>`<div class="item ${r.m===active?'on':''}" data-model="${r.m}">
        ${svg(P.cpu)}<span class="txt"><span class="nm">${r.nm}${r.m==='Max'?' <span class="badge-max">VIDEO</span>':''}</span><span class="ds">${r.ds}</span></span>${svg(P.check,'ico chk')}</div>`).join('');
}
function renderAud(active){
  return `<div class="grp">YOUR AUDIENCES</div>` + AUDIENCES.map(a=>`<div class="item ${a.id===active?'on':''}" data-aud="${a.id}">
      ${svg(P.people)}<span class="txt"><span class="nm">${a.nm}</span><span class="ds">${a.sub}</span></span>${svg(P.check,'ico chk')}</div>`).join('')
    + `<div class="sep"></div><div class="item"><span class="ico">${svg(P.plus)}</span><span class="txt"><span class="nm">Manage audiences</span></span>${svg(P.chevR,'ico chev-r')}</div>`;
}
function renderIntent(active){
  return `<div class="pop-hint">How should your audience judge this?</div><div class="seg">
    <button class="${active==='grow'?'on':''}" data-intent="grow">${svg(P.target)}<span>Grow</span><span class="sm">watch · share</span></button>
    <button class="${active==='sell'?'on':''}" data-intent="sell">${svg(P.tag)}<span>Sell</span><span class="sm">would-buy · price</span></button></div>`;
}

// ───────── pill labels ─────────
function paint(v){
  const st = ST[v], s = byId(st.skill), a = AUDIENCES.find(x=>x.id===st.aud);
  // skill pill
  document.getElementById('skillBtn'+v).innerHTML = `${svg(s.i)}<span>${s.nm}</span>${svg(P.chev,'ico ico-sm chev')}`;
  document.getElementById('skillBtn'+v).className = 'chip skill';
  // model (follows skill, overridable — track its own but default to skill's)
  st.model = st.model || s.m;
  const mdl = byId(st.skill).m; // skill drives default
  const showModel = st.modelOverride || mdl;
  const mb = document.getElementById('modelBtn'+v);
  mb.className = 'model' + (showModel==='Max'?' max':'');
  mb.innerHTML = `${svg(P.cpu,'ico ico-sm')}<b>SIM-1 ${showModel}</b>${svg(P.chev,'ico ico-sm chev')}`;
  // plus / mic / send
  document.getElementById('plus'+v).innerHTML = svg(P.plus);
  const mic = document.getElementById('mic'+v); if(mic) mic.innerHTML = svg(P.mic);
  document.getElementById('send'+v).innerHTML = svg(P.up);
  // stele + watermark
  document.getElementById('stele'+v).innerHTML = steleSvg();
  document.getElementById('wm'+v).innerHTML = steleSvg();
  // A-only chips
  if(v==='A'){
    document.getElementById('audBtnA').innerHTML = `${svg(P.people)}<span>${a.nm}</span>${svg(P.chev,'ico ico-sm chev')}`;
    const intentLbl = st.intent==='sell'?'Sell':'Grow';
    document.getElementById('intentBtnA').innerHTML = `${svg(P.target)}<span class="lbl-dim">intent</span><span>${intentLbl}</span>${svg(P.chev,'ico ico-sm chev')}`;
  }
}

// ───────── popover open/close ─────────
function fill(id){
  const v = id.endsWith('A')?'A':'B'; const st = ST[v]; const kind = id.replace(/[AB]$/,'');
  const el = document.getElementById(id);
  if(kind==='skill'){
    let head = '';
    if(v==='B'){ const a=AUDIENCES.find(x=>x.id===st.aud); const intentLbl=st.intent==='sell'?'Sell':'Grow';
      head = `<div class="grp" style="padding-top:6px">CONTEXT</div>
        <div class="item" data-open="audB">${svg(P.people)}<span class="txt"><span class="nm" style="font-size:13px">${a.nm}</span><span class="ds">active audience</span></span>${svg(P.chevR,'ico chev-r')}</div>
        <div class="item" data-open="intentB">${svg(P.target)}<span class="txt"><span class="nm" style="font-size:13px">${intentLbl}</span><span class="ds">intent</span></span>${svg(P.chevR,'ico chev-r')}</div>
        <div class="sep"></div>`; }
    el.innerHTML = head + renderSkillRows(st.skill);
    el.querySelectorAll('[data-open]').forEach(n=>n.onclick=(ev)=>{ ev.stopPropagation();
      const a=AUDIENCES.find(x=>x.id===st.aud); const intentLbl=st.intent==='sell'?'Sell':'Grow';
      // cycle for demo: audience → next, intent → toggle
      if(n.dataset.open==='audB'){ const i=AUDIENCES.findIndex(x=>x.id===st.aud); st.aud=AUDIENCES[(i+1)%AUDIENCES.length].id; }
      else st.intent = st.intent==='grow'?'sell':'grow';
      fill('skillB'); paint('B'); });
  }
  else if(kind==='slash') el.innerHTML = renderSkillRows(st.skill);
  else if(kind==='attach') el.innerHTML = renderAttach();
  else if(kind==='model') el.innerHTML = renderModel(st.modelOverride||byId(st.skill).m);
  else if(kind==='aud') el.innerHTML = renderAud(st.aud);
  else if(kind==='intent') el.innerHTML = renderIntent(st.intent);
  // wire clicks
  el.querySelectorAll('[data-skill]').forEach(n=>n.onclick=()=>{ st.skill=n.dataset.skill; st.modelOverride=null; closeAll(); paint(v); });
  el.querySelectorAll('[data-model]').forEach(n=>n.onclick=()=>{ st.modelOverride=n.dataset.model; closeAll(); paint(v); });
  el.querySelectorAll('[data-aud]').forEach(n=>n.onclick=()=>{ st.aud=n.dataset.aud; closeAll(); paint(v); });
  el.querySelectorAll('[data-intent]').forEach(n=>n.onclick=()=>{ st.intent=n.dataset.intent; closeAll(); paint(v); });
}
function closeAll(){ document.querySelectorAll('.pop.open').forEach(p=>p.classList.remove('open')); }
function toggle(id, e){ e.stopPropagation(); const el=document.getElementById(id); const was=el.classList.contains('open'); closeAll(); if(!was){ fill(id); el.classList.add('open'); } }

// slash command in textarea
function onInput(v){
  const ta = document.getElementById('ta'+v); const slash = document.getElementById('slash'+v);
  if(ta.value.startsWith('/')){ fill('slash'+v); slash.classList.add('open');
    // filter
    const q = ta.value.slice(1).toLowerCase();
    slash.querySelectorAll('.item').forEach(it=>{ const nm=(it.querySelector('.nm')?.textContent||'').toLowerCase(); it.style.display = (!q||nm.includes(q))?'':'none'; });
    slash.querySelectorAll('[data-skill]').forEach(n=>n.onclick=()=>{ ST[v].skill=n.dataset.skill; ST[v].modelOverride=null; ta.value=''; slash.classList.remove('open'); paint(v); });
  } else slash.classList.remove('open');
}

document.addEventListener('click', closeAll);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeAll(); });
function show(id,e){ document.querySelectorAll('.variant').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('variant-'+id).classList.add('active'); e.target.classList.add('active'); }

document.getElementById('globalNote').innerHTML =
  `<b>Both variants:</b> flat-warm THEME-06 (warm charcoal, cream, terracotta stele — no glass), premium line icons, popover-everywhere (cleaner than a sheet on mobile too). <b>+</b> opens upload/attach (the SIM-1 Max Test path). Skills grouped Creator/Marketing with a MAX badge where the video model fires. The right-side <b>SIM-1 Flash/Max</b> indicator is auto-set by the skill, overridable. Type <code>/</code> in the field for fast skill entry. <b>A</b> shows audience + intent as always-on chips; <b>B</b> keeps the bar minimal and folds them into the skill popover — pick based on whether at-a-glance audience/intent is worth the density.`;

paint('A'); paint('B');
</script>
