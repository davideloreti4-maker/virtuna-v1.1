<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#07080a;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding:40px;display:flex;gap:28px;flex-wrap:wrap}
  .card{
    width:230px;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:22px;
    background:linear-gradient(137deg,rgba(17,18,20,.75) 4.87%,rgba(12,13,15,.9) 75.88%);
    box-shadow:rgba(255,255,255,.15) 0 1px 1px 0 inset;
  }
  .tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#848586;margin-bottom:20px;display:block}
  .row{display:flex;align-items:center;gap:28px}
  .lbl{font-size:9px;color:#848586;margin-top:10px;text-align:center;letter-spacing:.05em}
  .item{display:flex;flex-direction:column;align-items:center}
  svg{display:block;color:#fff}
</style></head>
<body>

  <!-- A: corners only (previous) -->
  <div class="card"><span class="tag">A · corners only (old)</span>
    <div class="row">
      <div class="item">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="20" cy="80" r="7.5" fill="currentColor"/><circle cx="20" cy="20" r="7.5" fill="currentColor"/>
          <circle cx="80" cy="80" r="7.5" fill="currentColor"/><circle cx="80" cy="20" r="7.5" fill="currentColor"/>
        </svg><span class="lbl">26px</span>
      </div>
      <div class="item">
        <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="20" cy="80" r="7.5" fill="currentColor"/><circle cx="20" cy="20" r="7.5" fill="currentColor"/>
          <circle cx="80" cy="80" r="7.5" fill="currentColor"/><circle cx="80" cy="20" r="7.5" fill="currentColor"/>
        </svg><span class="lbl">64px</span>
      </div>
    </div>
  </div>

  <!-- B: + center hub -->
  <div class="card"><span class="tag">B · + central hub node</span>
    <div class="row">
      <div class="item">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="20" cy="80" r="6.5" fill="currentColor"/><circle cx="20" cy="20" r="6.5" fill="currentColor"/>
          <circle cx="80" cy="80" r="6.5" fill="currentColor"/><circle cx="80" cy="20" r="6.5" fill="currentColor"/>
          <circle cx="50" cy="50" r="8.5" fill="currentColor"/>
        </svg><span class="lbl">26px</span>
      </div>
      <div class="item">
        <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="20" cy="80" r="6.5" fill="currentColor"/><circle cx="20" cy="20" r="6.5" fill="currentColor"/>
          <circle cx="80" cy="80" r="6.5" fill="currentColor"/><circle cx="80" cy="20" r="6.5" fill="currentColor"/>
          <circle cx="50" cy="50" r="8.5" fill="currentColor"/>
        </svg><span class="lbl">64px</span>
      </div>
    </div>
  </div>

  <!-- C: hub with activation halo -->
  <div class="card"><span class="tag">C · hub w/ activation halo</span>
    <div class="row">
      <div class="item">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="20" cy="80" r="6" fill="currentColor"/><circle cx="20" cy="20" r="6" fill="currentColor"/>
          <circle cx="80" cy="80" r="6" fill="currentColor"/><circle cx="80" cy="20" r="6" fill="currentColor"/>
          <circle cx="50" cy="50" r="11" stroke="currentColor" stroke-width="3" fill="none" opacity="0.5"/>
          <circle cx="50" cy="50" r="5.5" fill="currentColor"/>
        </svg><span class="lbl">26px</span>
      </div>
      <div class="item">
        <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="20" cy="80" r="6" fill="currentColor"/><circle cx="20" cy="20" r="6" fill="currentColor"/>
          <circle cx="80" cy="80" r="6" fill="currentColor"/><circle cx="80" cy="20" r="6" fill="currentColor"/>
          <circle cx="50" cy="50" r="11" stroke="currentColor" stroke-width="3" fill="none" opacity="0.5"/>
          <circle cx="50" cy="50" r="5.5" fill="currentColor"/>
        </svg><span class="lbl">64px</span>
      </div>
    </div>
  </div>

  <!-- D: organic varied nodes (echoes audience bubbles) -->
  <div class="card"><span class="tag">D · varied nodes (organic)</span>
    <div class="row">
      <div class="item">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
          <circle cx="20" cy="80" r="5" fill="currentColor"/><circle cx="20" cy="20" r="7" fill="currentColor"/>
          <circle cx="80" cy="80" r="6" fill="currentColor"/><circle cx="80" cy="20" r="5" fill="currentColor"/>
          <circle cx="50" cy="50" r="9" fill="currentColor"/>
        </svg><span class="lbl">26px</span>
      </div>
      <div class="item">
        <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
          <path d="M20 80 V20 L80 80 V20" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
          <circle cx="20" cy="80" r="5" fill="currentColor"/><circle cx="20" cy="20" r="7" fill="currentColor"/>
          <circle cx="80" cy="80" r="6" fill="currentColor"/><circle cx="80" cy="20" r="5" fill="currentColor"/>
          <circle cx="50" cy="50" r="9" fill="currentColor"/>
        </svg><span class="lbl">64px</span>
      </div>
    </div>
  </div>

</body></html>
